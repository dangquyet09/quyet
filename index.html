<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Shopee Video Tool · Nghiện Sale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0f1a; --glass:rgba(255,255,255,0.05); --ring:rgba(255,255,255,0.1);
    --text:#fff; --muted:rgba(255,255,255,0.6); --brand:#ff4d2d; --brand-2:#ff8a65; --gold:#ffc24d;
  }
  *{box-sizing:border-box}
  body{margin:0; padding:0 14px 90px; font-family:'Inter',sans-serif; color:var(--text);
    background:radial-gradient(circle at 20% 20%, #1f1f2e, #0f0f1a) fixed; min-height:100vh}
  .topbar{max-width:1000px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:16px 2px 6px}
  .brand{font-size:20px; font-weight:800; background:linear-gradient(90deg,#ff4d2d,#ff8a65);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
  .icon-btn{background:var(--glass); border:1px solid var(--ring); color:#fff; width:40px; height:40px;
    border-radius:999px; cursor:pointer; font-size:16px}
  .icon-btn:hover{background:rgba(255,255,255,0.12)}
  .searchbar{max-width:1000px; margin:6px auto 14px; display:flex; gap:8px}
  .searchbar input{flex:1; padding:12px 16px; border-radius:999px; border:1px solid var(--ring);
    background:var(--glass); color:#fff; font-size:14px; outline:none}
  .searchbar input::placeholder{color:rgba(255,255,255,0.45)}
  .searchbar button{padding:12px 22px; border:none; border-radius:999px; font-weight:700; color:#fff;
    background:linear-gradient(135deg,#ff4d2d,#ff8a65); cursor:pointer}
  .status{max-width:1000px; margin:0 auto 10px; color:var(--muted); font-size:13px; text-align:center}
  .grid{max-width:1000px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px}
  .card{background:var(--glass); border:1px solid var(--ring); border-radius:16px; overflow:hidden; display:flex; flex-direction:column}
  .thumb{width:100%; aspect-ratio:1/1; object-fit:cover; background:#1a1a28}
  .body{padding:10px; display:flex; flex-direction:column; gap:6px; flex:1}
  .name{font-size:13px; font-weight:600; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2;
    -webkit-box-orient:vertical; overflow:hidden; min-height:36px}
  .price{font-size:14px; font-weight:800; color:var(--gold)}
  .price .old{font-size:11px; font-weight:500; color:var(--muted); text-decoration:line-through; margin-left:6px}
  .copy-btn{margin-top:auto; padding:9px; border:none; border-radius:10px; font-weight:700; font-size:13px;
    color:#fff; background:linear-gradient(135deg,#ff4d2d,#ff8a65); cursor:pointer}
  .copy-btn:active{transform:scale(0.97)}
  .toggles{display:flex; gap:6px}
  .tg{flex:1; padding:6px; border-radius:8px; border:1px solid var(--ring); background:transparent;
    color:var(--muted); font-size:11px; cursor:pointer}
  .tg.on{background:rgba(76,217,123,0.15); border-color:#4cd97b; color:#4cd97b}
  .empty{max-width:1000px; margin:40px auto; text-align:center; color:var(--muted)}
  .loadmore-wrap{max-width:1000px; margin:18px auto; text-align:center}
  .loadmore{padding:12px 28px; border:1px solid var(--ring); border-radius:999px; background:var(--glass);
    color:#fff; font-weight:700; cursor:pointer}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#222; color:#fff;
    padding:12px 20px; border-radius:999px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s; border:1px solid var(--ring)}
  .toast.show{opacity:1}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">🛍️ Shopee Video Tool</div>
    <button class="icon-btn" id="reload" title="Tải lại">⟳</button>
  </div>

  <div class="searchbar">
    <input id="search" placeholder="Lọc sản phẩm theo tên...">
    <button id="searchBtn">Lọc</button>
  </div>

  <div class="status" id="status">Đang tải sản phẩm...</div>
  <div class="grid" id="grid"></div>
  <div class="loadmore-wrap" id="loadmoreWrap" style="display:none">
    <button class="loadmore" id="loadmore">Tải thêm</button>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const API = '/api';
  let page = 1;
  let all = [];
  let done = JSON.parse(localStorage.getItem('sv_done') || '{}');

  const grid = document.getElementById('grid');
  const statusEl = document.getElementById('status');
  const toastEl = document.getElementById('toast');
  const loadmoreWrap = document.getElementById('loadmoreWrap');

  function saveDone(){ localStorage.setItem('sv_done', JSON.stringify(done)); }

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(function(){ toastEl.classList.remove('show'); }, 1600);
  }

  function money(n){
    if(n === null || n === undefined || n === '') return '';
    return Number(n).toLocaleString('vi-VN') + 'đ';
  }

  function keyOf(p){ return p.link || p.title; }

  function render(list){
    grid.innerHTML = '';
    if(!list.length){
      grid.innerHTML = '<div class="empty">Không có sản phẩm nào.</div>';
      return;
    }
    list.forEach(function(p){
      const k = keyOf(p);
      const isDone = !!done[k];
      const priceHtml = (p.discount && p.discount < p.price)
        ? money(p.discount) + '<span class="old">' + money(p.price) + '</span>'
        : money(p.price);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<img class="thumb" loading="lazy" src="' + (p.image||'') + '" alt="">' +
        '<div class="body">' +
          '<div class="name">' + (p.title||'') + '</div>' +
          '<div class="price">' + priceHtml + '</div>' +
          '<button class="copy-btn">📋 Copy link</button>' +
          '<div class="toggles">' +
            '<button class="tg ' + (isDone?'on':'') + '">' + (isDone?'✓ Đã làm':'Đánh dấu') + '</button>' +
          '</div>' +
        '</div>';
      card.querySelector('.copy-btn').addEventListener('click', function(){
        navigator.clipboard.writeText(p.link).then(function(){ toast('Đã copy link affiliate!'); });
      });
      card.querySelector('.tg').addEventListener('click', function(){
        done[k] = !done[k];
        saveDone();
        render(currentView());
      });
      grid.appendChild(card);
    });
  }

  function currentView(){
    const q = document.getElementById('search').value.trim().toLowerCase();
    if(!q) return all;
    return all.filter(function(p){ return (p.title||'').toLowerCase().indexOf(q) >= 0; });
  }

  function load(p){
    statusEl.textContent = 'Đang tải sản phẩm...';
    fetch(API + '/items?page=' + p)
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(data.error){
          statusEl.textContent = 'Lỗi: ' + data.error + (data.message ? (' - ' + data.message) : '');
          return;
        }
        const list = data.products || [];
        all = all.concat(list);
        statusEl.textContent = 'Đã tải ' + all.length + ' sản phẩm';
        render(currentView());
        loadmoreWrap.style.display = list.length ? 'block' : 'none';
      })
      .catch(function(e){ statusEl.textContent = 'Không tải được dữ liệu: ' + e; });
  }

  document.getElementById('loadmore').addEventListener('click', function(){ page++; load(page); });
  document.getElementById('reload').addEventListener('click', function(){ page = 1; all = []; load(page); });
  document.getElementById('searchBtn').addEventListener('click', function(){ render(currentView()); });
  document.getElementById('search').addEventListener('input', function(){ render(currentView()); });

  load(page);
</script>
</body>
</html>
